services:
  - type: web
    name: applypilot
    runtime: python
    buildCommand: pip install -e .
    startCommand: uvicorn applypilot.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APPLYPILOT_GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GOOGLE_API_KEY
        sync: false          # set in Render dashboard
      - key: MONGODB_URI
        sync: false          # set in Render dashboard
      - key: JWT_SECRET_KEY
        sync: false          # set in Render dashboard — use a long random string
